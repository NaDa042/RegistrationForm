


<!DOCTYPE html>

<html lang = "en">
    <head>
        <title>Registration Form</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Registration Form</h1>
        <p>Please fill out this form with the required information</p>

        <form action="https://register-demo.freecodecamp.org" method="post">
            <fieldset>
                <label for="first-name">
                    Enter Your First Name:
                    <input type="text" name="first-name" id="first-name" required>
                </label>
                <label for="last-name">
                    Enter Your Last Name:
                    <input name="last-name" type="text" id="last-name" required>
                </label>
                <label for="email">
                    Enter Your Email:
                    <input type="email"  id="email" name="email" required>
                </label>
                <label for="new-password" >
                Create a New Password:
                <input type="password" pattern="[a-z0-5]{8,}" name="password" id="new-password" required>
                </label>
            </fieldset>
            <fieldset>
                <legend>Account type (required)</legend>
                <label for="personal-account">
                    <input class="inline" checked type="radio" name="account-type" id="personal-account">
                    Personal
                </label>
                <label for="business-account">
                    <input class="inline" type="radio" name="account-type" id="business-account"> 
                    Business                   
                </label>
            </fieldset>
            <fieldset>
                <label for="profile-picture">
                    Upload a profile picture:
                    <input type="file" name="profile-picture" id="profile-picture">
                </label>
                <label for="age">
                    Input your age (years):
                    <input type="number" min="13" max="120" name="age" id="age">
                </label>
                <label for="referrer">
                    How did you hear about us?
                    <select name="referrer" id="referrer">
                        <option value="">(select one)</option>
                        <option value="1">Instagram</option>
                        <option value="2">LinkedIn</option>
                        <option value="3">Friends</option>
                        <option value="4">Other</option>
                    </select>
                </label>
                <label for="bio">
                    Provide a bio:
                    <textarea name ="bio" placeholder="I like coding on the beach..." id="bio" rows="3" cols="30">
                    </textarea>
                    
                </label>
            </fieldset>
            <label for="terms-and-conditions">
                <input class="inline" required name="terms-and-conditions" type="checkbox" id="terms-and-conditions">
                I accept the <a href="https://www.freecodecamp.org/news/terms-of-service/">terms and conditions</a>
            </label>
            <input name="submit" type="submit" value="Submit">
        </form>
    </body>
</html>
